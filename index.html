<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Highway Racer 2D - Sons e Carros sem Quadrados</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a1f2e 0%, #061218 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            transition: background 0.2s;
        }

        body:fullscreen {
            background: #000;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body:-webkit-full-screen {
            background: #000;
            padding: 0;
        }
        body:-moz-full-screen {
            background: #000;
            padding: 0;
        }

        .game-container {
            background: #0f212e;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid #3fa7d0;
            transition: all 0.2s;
        }

        body:fullscreen .game-container {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            border-radius: 0;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 0 0 6px #1c3442, 0 12px 28px black;
            cursor: pointer;
            background-color: #1e2e2c;
        }

        body:fullscreen canvas {
            border-radius: 0;
            box-shadow: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            gap: 15px;
            flex-wrap: wrap;
            background: #0a141ccc;
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid #3fa7d0aa;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .info-panel.hidden {
            display: none;
        }

        .score-box, .coin-box {
            background: #010101bb;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.6rem;
            color: #f9f3c1;
            text-shadow: 0 2px 0 #1f4f6b;
            font-family: monospace;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .score-box span, .coin-box span {
            font-size: 2rem;
            color: #6bc9ff;
        }

        .coin-box span {
            color: #ffd966;
        }

        .controls {
            display: flex;
            gap: 18px;
            background: #00000066;
            padding: 6px 18px;
            border-radius: 50px;
        }

        button {
            background: #2d4a3a;
            border: none;
            font-size: 2rem;
            padding: 5px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #1e3a2a;
            color: white;
            font-weight: bold;
            font-family: monospace;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1e3a2a;
        }

        .restart-btn, .shop-btn {
            background: #c07a2e;
            font-size: 1.3rem;
            padding: 6px 24px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .shop-btn {
            background: #3a6b8a;
        }

        .start-btn {
            background: #2e7d5e;
            font-size: 1.5rem;
            padding: 6px 28px;
            font-weight: bold;
            box-shadow: 0 4px 0 #1a5a40;
        }

        .status {
            background: #020c12;
            padding: 5px 20px;
            border-radius: 32px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #6bc9ff;
            font-family: monospace;
        }

        .instruction {
            background: #1a2b24;
            font-size: 0.8rem;
            padding: 6px 15px;
            border-radius: 50px;
            color: #bbddff;
            margin-top: 12px;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: monospace;
        }
        .modal-content {
            background: #1a2a2f;
            border-radius: 40px;
            padding: 20px;
            width: 320px;
            max-width: 90%;
            border: 2px solid #ffd966;
            text-align: center;
            color: white;
        }
        .modal-content h2 {
            margin-top: 0;
            color: #ffd966;
        }
        .color-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0e1a1f;
            margin: 12px 0;
            padding: 10px 15px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
        }
        .color-option:hover {
            background: #2a4a55;
        }
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            border: 2px solid white;
        }
        .color-price {
            font-weight: bold;
            color: #ffd966;
        }
        .close-modal {
            background: #c07a2e;
            margin-top: 15px;
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
            cursor: pointer;
        }
        @media (max-width: 560px) {
            .info-panel {
                justify-content: center;
            }
            button {
                font-size: 1.5rem;
                padding: 3px 16px;
            }
            .score-box, .coin-box {
                font-size: 1.2rem;
            }
            .start-btn {
                font-size: 1.2rem;
                padding: 4px 20px;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="550"></canvas>
        <div class="info-panel" id="infoPanel">
            <div class="score-box">🏆 SCORE <span id="scoreValue">0</span></div>
            <div class="coin-box">🪙 MOEDAS <span id="coinValue">0</span></div>
            <div class="controls">
                <button id="upBtn">⬆️ CIMA</button>
                <button id="downBtn">⬇️ BAIXO</button>
            </div>
            <button id="startBtn" class="start-btn">🚀 INICIAR JOGO</button>
            <button id="shopBtn" class="shop-btn">🛒 LOJA</button>
            <button id="restartBtn" class="restart-btn">🔄 REINICIAR</button>
            <div class="status" id="gameStatusText">🏁 MENU PRINCIPAL</div>
        </div>
        <div class="instruction">🎮 TECLADO: ↑ ↓ para mover | Sons ativados (motor, moeda, colisão) | Carros sem bordas quadradas!</div>
    </div>
</div>

<div id="shopModal" class="modal">
    <div class="modal-content">
        <h2>🛒 LOJA DE CORES</h2>
        <p>Suas moedas: <strong id="modalCoins">0</strong> 🪙</p>
        <div id="colorList"></div>
        <div class="close-modal" id="closeModal">FECHAR</div>
    </div>
</div>

<script>
    (function(){
        // ==================== JOGO HORIZONTAL COM SONS E CARROS ORGÂNICOS ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const infoPanel = document.getElementById('infoPanel');
        
        // Estado do jogo
        let gameState = 'menu';
        
        // Dimensões
        const ROAD_W = canvas.width;
        const ROAD_H = canvas.height;
        
        // Carro principal
        const CAR_W = 68;
        const CAR_H = 72;
        let playerY = ROAD_H/2 - CAR_H/2;
        const playerX = 130;
        const MIN_Y = 30;
        const MAX_Y = ROAD_H - CAR_H - 30;
        
        // Trânsito e moedas
        let traffic = [];
        let coins = [];
        const COIN_SIZE = 38;
        let coinParticles = [];
        
        // Variáveis de jogo
        let score = 0;
        let frameCounter = 0;
        let baseSpawnDelay = 44;
        let currentSpawnDelay = baseSpawnDelay;
        let baseSpeed = 5.0;
        let currentSpeed = baseSpeed;
        
        // Cores adversárias
        const oppColors = ["#c0392b","#d45c2c","#2c6e3c","#3a5e8c","#6f4e2e","#8e3c5a","#1f618d","#7d6608"];
        const oppEmojis = ["🚗","🚕","🚙","🚌","🚛","🚜","🏎️","🚓"];
        
        // Cores do carro principal
        const availableColors = [
            { name: "Azul Padrão", code: "#1E88E5", dark: "#0D47A1", light: "#42A5F5", price: 0, owned: true },
            { name: "Vermelho", code: "#E53935", dark: "#B71C1C", light: "#EF5350", price: 50, owned: false },
            { name: "Verde", code: "#43A047", dark: "#2E7D32", light: "#66BB6A", price: 50, owned: false },
            { name: "Amarelo", code: "#FDD835", dark: "#F9A825", light: "#FFEE58", price: 60, owned: false },
            { name: "Roxo", code: "#8E24AA", dark: "#6A1B9A", light: "#AB47BC", price: 70, owned: false },
            { name: "Laranja", code: "#FB8C00", dark: "#E65100", light: "#FFA726", price: 55, owned: false },
            { name: "Rosa", code: "#EC407A", dark: "#C2185B", light: "#F06292", price: 65, owned: false },
            { name: "Ciano", code: "#00ACC1", dark: "#00838F", light: "#26C6DA", price: 75, owned: false }
        ];
        let currentCarColor = availableColors[0];
        
        // Efeitos visuais
        let hitShake = 0;
        let scoreParticles = [];
        let speedLines = [];
        let coinSpawnCounter = 0;
        let coinSpawnDelay = 70;
        let playerCoins = 0;
        
        // ==================== SONS ====================
        let audioCtx = null;
        let engineOsc = null;
        let engineGain = null;
        let isEnginePlaying = false;
        
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playEngineSound() {
            if (!audioCtx || gameState !== 'playing') return;
            if (isEnginePlaying) return;
            try {
                engineGain = audioCtx.createGain();
                engineOsc = audioCtx.createOscillator();
                engineOsc.type = 'sawtooth';
                engineOsc.frequency.value = 80;
                engineGain.gain.value = 0.15;
                engineOsc.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                engineOsc.start();
                isEnginePlaying = true;
                // variação de acordo com a velocidade
                function updateEnginePitch() {
                    if (!isEnginePlaying || gameState !== 'playing') return;
                    if (audioCtx && engineOsc) {
                        let speedFactor = Math.min(2.0, currentSpeed / baseSpeed);
                        engineOsc.frequency.value = 80 + (speedFactor - 1) * 60;
                    }
                    requestAnimationFrame(updateEnginePitch);
                }
                updateEnginePitch();
            } catch(e) { console.log("Audio error", e); }
        }
        
        function stopEngineSound() {
            if (engineOsc) {
                try { engineOsc.stop(); } catch(e) {}
                engineOsc = null;
                engineGain = null;
                isEnginePlaying = false;
            }
        }
        
        function playCoinSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 880;
                gain.gain.value = 0.2;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }
        
        function playCrashSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = 150;
                gain.gain.value = 0.3;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.4);
                osc.stop(audioCtx.currentTime + 0.5);
            } catch(e) {}
        }
        
        // ==================== PERSISTÊNCIA ====================
        function saveData() {
            localStorage.setItem("highway_coins", playerCoins);
            const ownedIndices = [];
            for(let i=0; i<availableColors.length; i++) if(availableColors[i].owned) ownedIndices.push(i);
            localStorage.setItem("highway_colors", JSON.stringify(ownedIndices));
            const currentIdx = availableColors.findIndex(c => c.name === currentCarColor.name);
            localStorage.setItem("highway_current_color", currentIdx);
        }
        
        function loadSaveData() {
            const savedCoins = localStorage.getItem("highway_coins");
            if(savedCoins !== null) playerCoins = parseInt(savedCoins);
            const savedColors = localStorage.getItem("highway_colors");
            if(savedColors !== null) {
                const ownedIndices = JSON.parse(savedColors);
                for(let i=0; i<availableColors.length; i++) if(ownedIndices.includes(i)) availableColors[i].owned = true;
            }
            const savedCurrent = localStorage.getItem("highway_current_color");
            if(savedCurrent !== null) {
                const idx = parseInt(savedCurrent);
                if(availableColors[idx] && availableColors[idx].owned) currentCarColor = availableColors[idx];
            }
            updateCoinUI();
        }
        
        function addCoins(amount) {
            playerCoins += amount;
            updateCoinUI();
            saveData();
            playCoinSound();
        }
        
        function spendCoins(price) {
            if(playerCoins >= price) {
                playerCoins -= price;
                updateCoinUI();
                saveData();
                return true;
            }
            return false;
        }
        
        function updateCoinUI() { document.getElementById('coinValue').innerText = playerCoins; }
        
        // ==================== TELA CHEIA ====================
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            infoPanel.classList.add('hidden');
        }
        
        function exitFullscreen() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
            infoPanel.classList.remove('hidden');
        }
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && gameState === 'playing') gameOver();
        });
        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement && gameState === 'playing') gameOver();
        });
        
        // ==================== FUNÇÕES DO JOGO ====================
        function resetGameData() {
            score = 0; updateScoreUI();
            traffic = []; coins = []; coinParticles = [];
            playerY = ROAD_H/2 - CAR_H/2;
            frameCounter = 0; coinSpawnCounter = 0;
            currentSpeed = baseSpeed; currentSpawnDelay = baseSpawnDelay;
            hitShake = 0; scoreParticles = []; speedLines = [];
        }
        
        function startGame() {
            resetGameData();
            gameState = 'playing';
            document.getElementById('gameStatusText').innerHTML = "🏁 CORRENDO";
            document.getElementById('gameStatusText').style.color = "#6bc9ff";
            enterFullscreen();
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            playEngineSound();
        }
        
        function gameOver() {
            gameState = 'menu';
            document.getElementById('gameStatusText').innerHTML = "💥 GAME OVER - MENU";
            document.getElementById('gameStatusText').style.color = "#e67e22";
            exitFullscreen();
            stopEngineSound();
            playCrashSound();
        }
        
        function updateScoreUI() { document.getElementById('scoreValue').innerText = score; }
        
        function movePlayer(deltaY) {
            if (gameState !== 'playing') return;
            let newY = playerY + deltaY;
            if (newY >= MIN_Y && newY <= MAX_Y) {
                playerY = newY;
                for(let i=0;i<2;i++) speedLines.push({ x: playerX + CAR_W - 12, y: playerY + CAR_H/2 + (Math.random()-0.5)*12, life: 0.65 });
            }
        }
        
        function spawnTraffic() {
            const carY = MIN_Y + Math.random() * (MAX_Y - MIN_Y);
            const color = oppColors[Math.floor(Math.random() * oppColors.length)];
            const emoji = oppEmojis[Math.floor(Math.random() * oppEmojis.length)];
            const wVar = CAR_W + (Math.random()-0.5)*8;
            const hVar = CAR_H + (Math.random()-0.5)*8;
            traffic.push({
                x: ROAD_W + 40, y: carY,
                w: Math.min(78, Math.max(56, wVar)), h: Math.min(80, Math.max(60, hVar)),
                color: color, emoji: emoji,
                speed: currentSpeed + (Math.random() - 0.5) * 2.0
            });
        }
        
        function spawnCoin() {
            const coinY = MIN_Y + Math.random() * (MAX_Y - MIN_Y);
            coins.push({ x: ROAD_W + 40, y: coinY, w: COIN_SIZE, h: COIN_SIZE });
        }
        
        function createCoinBurst(x, y) {
            for(let i=0;i<16;i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 5;
                coinParticles.push({
                    x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2,
                    life: 0.8 + Math.random()*0.5, size: 8 + Math.random()*8, rotation: Math.random()*Math.PI*2
                });
            }
        }
        
        function updateGame() {
            if (gameState !== 'playing') return;
            let difficulty = Math.min(1.3, score / 400);
            currentSpeed = baseSpeed + difficulty * 6.2;
            currentSpawnDelay = Math.max(20, baseSpawnDelay - Math.floor(difficulty * 26));
            
            if(frameCounter >= currentSpawnDelay) { spawnTraffic(); frameCounter = 0; if (Math.random() < 0.12 && score > 50) spawnTraffic(); }
            else frameCounter++;
            
            if(coinSpawnCounter >= coinSpawnDelay) { spawnCoin(); coinSpawnCounter = 0; coinSpawnDelay = 55 + Math.floor(Math.random() * 40); }
            else coinSpawnCounter++;
            
            for(let car of traffic) car.x -= car.speed;
            for(let coin of coins) coin.x -= currentSpeed * 0.9;
            
            traffic = traffic.filter(car => car.x + car.w > -50);
            let newCoins = [];
            const playerRect = { x: playerX, y: playerY, w: CAR_W, h: CAR_H };
            for(let coin of coins) {
                const coinRect = { x: coin.x, y: coin.y, w: coin.w, h: coin.h };
                if(playerRect.x < coinRect.x + coinRect.w && playerRect.x + playerRect.w > coinRect.x &&
                   playerRect.y < coinRect.y + coinRect.h && playerRect.y + playerRect.h > coinRect.y) {
                    addCoins(1);
                    createCoinBurst(coin.x + coin.w/2, coin.y + coin.h/2);
                    scoreParticles.push({ x: coin.x + coin.w/2, y: coin.y + coin.h/2, life: 1.0, isCoin: true });
                } else newCoins.push(coin);
            }
            coins = newCoins;
            
            for(let p of coinParticles) { p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.life -= 0.02; p.rotation += 0.1; }
            coinParticles = coinParticles.filter(p => p.life > 0 && p.y < ROAD_H + 100);
            
            for(let car of traffic) {
                const carRect = { x: car.x, y: car.y, w: car.w, h: car.h };
                if(playerRect.x < carRect.x + carRect.w && playerRect.x + playerRect.w > carRect.x &&
                   playerRect.y < carRect.y + carRect.h && playerRect.y + playerRect.h > carRect.y) {
                    gameOver();
                    break;
                }
            }
            
            for(let car of traffic) {
                if(car.x + car.w < 0) {
                    score++; updateScoreUI();
                    scoreParticles.push({ x: car.x + car.w, y: car.y + car.h/2, life: 1.0 });
                }
            }
            traffic = traffic.filter(car => car.x + car.w > -50);
            
            if(hitShake > 0) hitShake -= 0.45; else hitShake = 0;
            speedLines = speedLines.filter(s => { s.life -= 0.045; s.x -= 9; return s.life > 0 && s.x > 0; });
            scoreParticles = scoreParticles.filter(p => { p.life -= 0.04; p.y -= 1.5; return p.life > 0; });
        }
        
        // ==================== DESENHO SEM QUADRADOS (CARROS ORGÂNICOS) ====================
        function drawCarBody(x, y, w, h, color, darkColor, lightColor, isPlayer = false, emoji = "🚗") {
            // Carro sem bordas retangulares: usamos caminhos suaves, elipses e formas curvilíneas
            ctx.save();
            ctx.shadowBlur = isPlayer ? 8 : 4;
            ctx.shadowColor = isPlayer ? color : "rgba(0,0,0,0.3)";
            
            // Corpo principal arredondado (sem cantos retos)
            ctx.beginPath();
            ctx.moveTo(x + w*0.2, y);
            ctx.quadraticCurveTo(x + w/2, y - h*0.05, x + w*0.8, y);
            ctx.lineTo(x + w - 8, y + h*0.2);
            ctx.quadraticCurveTo(x + w - 4, y + h/2, x + w - 8, y + h*0.8);
            ctx.lineTo(x + w*0.8, y + h);
            ctx.quadraticCurveTo(x + w/2, y + h*1.05, x + w*0.2, y + h);
            ctx.lineTo(x + 8, y + h*0.8);
            ctx.quadraticCurveTo(x + 4, y + h/2, x + 8, y + h*0.2);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            
            // Teto (curva suave)
            ctx.beginPath();
            ctx.moveTo(x + w*0.25, y + h*0.15);
            ctx.quadraticCurveTo(x + w/2, y - h*0.02, x + w*0.75, y + h*0.15);
            ctx.lineTo(x + w*0.7, y + h*0.45);
            ctx.quadraticCurveTo(x + w/2, y + h*0.35, x + w*0.3, y + h*0.45);
            ctx.closePath();
            ctx.fillStyle = lightColor;
            ctx.fill();
            
            // Janelas
            ctx.fillStyle = "#2c3e50";
            ctx.beginPath();
            ctx.ellipse(x + w*0.32, y + h*0.28, w*0.12, h*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w*0.68, y + h*0.28, w*0.12, h*0.12, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Faróis
            ctx.fillStyle = "#FFE082";
            ctx.beginPath();
            ctx.ellipse(x + w - 10, y + h*0.3, 6, 8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w - 10, y + h*0.7, 6, 8, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Rodas (sem retângulos)
            ctx.fillStyle = "#2c2e2a";
            ctx.beginPath();
            ctx.ellipse(x + w*0.2, y + h - 8, 9, 7, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w*0.8, y + h - 8, 9, 7, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#555";
            ctx.beginPath();
            ctx.ellipse(x + w*0.2, y + h - 8, 5, 4, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + w*0.8, y + h - 8, 5, 4, 0, 0, Math.PI*2);
            ctx.fill();
            
            // Emoticon
            ctx.font = `${Math.min(36, h-15)}px "Segoe UI Emoji", "Apple Color Emoji"`;
            ctx.textAlign = "center";
            ctx.fillStyle = "#FFF9E6";
            ctx.fillText(emoji, x + w/2, y + h/2 + 5);
            
            ctx.restore();
        }
        
        function drawPlayerCar() {
            if(hitShake > 0) { ctx.save(); ctx.translate((Math.random()-0.5)*hitShake, (Math.random()-0.5)*hitShake); }
            drawCarBody(playerX, playerY, CAR_W, CAR_H, currentCarColor.code, currentCarColor.dark, currentCarColor.light, true, "😎");
            if(hitShake > 0) ctx.restore();
        }
        
        function drawTraffic() {
            for(let car of traffic) {
                drawCarBody(car.x, car.y, car.w, car.h, car.color, "#2c2e2a", "#5a6a7a", false, car.emoji);
            }
        }
        
        function drawCoins() {
            for(let coin of coins) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#ffaa33";
                ctx.fillStyle = "#FFD700";
                ctx.beginPath();
                ctx.ellipse(coin.x + coin.w/2, coin.y + coin.h/2, coin.w/2 + 3, coin.h/2 + 3, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#FFC107";
                ctx.beginPath();
                ctx.ellipse(coin.x + coin.w/2, coin.y + coin.h/2, coin.w/2, coin.h/2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#B8860B";
                ctx.beginPath();
                ctx.ellipse(coin.x + coin.w/2, coin.y + coin.h/2, coin.w/3.5, coin.h/3.5, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.font = `${coin.h-10}px "Segoe UI Emoji"`;
                ctx.fillStyle = "#FFF176";
                ctx.fillText("🪙", coin.x + coin.w/2 - 10, coin.y + coin.h/2 + 8);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawCoinParticles() {
            for(let p of coinParticles) {
                ctx.save();
                ctx.globalAlpha = p.life * 0.9;
                ctx.shadowBlur = 4;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = "#FFD700";
                ctx.beginPath();
                ctx.ellipse(0, 0, p.size/2, p.size/2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#DAA520";
                ctx.beginPath();
                ctx.ellipse(0, 0, p.size/3, p.size/3, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.font = `${p.size-4}px "Segoe UI Emoji"`;
                ctx.fillStyle = "#FFEE88";
                ctx.fillText("🪙", -p.size/2 + 2, p.size/4);
                ctx.restore();
            }
            ctx.globalAlpha = 1;
        }
        
        function drawRoad() {
            const grad = ctx.createLinearGradient(0,0,0,ROAD_H);
            grad.addColorStop(0,"#252e2a"); grad.addColorStop(1,"#151e1a");
            ctx.fillStyle = grad; ctx.fillRect(0,0,ROAD_W,ROAD_H);
            ctx.fillStyle = "#3b4842";
            for(let i=0;i<400;i++) ctx.fillRect((i*97)%ROAD_W, (i*131)%ROAD_H, 2,1);
            ctx.beginPath(); ctx.setLineDash([30,40]); ctx.lineWidth=5; ctx.strokeStyle="#FFD966";
            ctx.moveTo(0,ROAD_H/2); ctx.lineTo(ROAD_W,ROAD_H/2); ctx.stroke();
            ctx.setLineDash([]); ctx.lineWidth=4; ctx.strokeStyle="#e0aa40";
            ctx.strokeRect(14,14,ROAD_W-28,ROAD_H-28);
            ctx.fillStyle="#3f7240"; ctx.fillRect(0,0,16,ROAD_H); ctx.fillRect(ROAD_W-16,0,16,ROAD_H);
            ctx.fillStyle="#6b9e4a";
            for(let i=0;i<15;i++) { ctx.fillRect(5, i*45+15, 6,22); ctx.fillRect(ROAD_W-11, i*45+15, 6,22); }
            ctx.fillStyle="#e7bc6e";
            for(let x=50; x<ROAD_W-50; x+=80) ctx.fillRect(x, ROAD_H/2-6, 16,12);
        }
        
        function drawSpeedEffects() {
            for(let s of speedLines) { ctx.globalAlpha = s.life*0.7; ctx.fillStyle="#88ccff"; ctx.fillRect(s.x, s.y, 14,5); }
            ctx.globalAlpha=1;
            let intensity = Math.min(0.6, (currentSpeed - baseSpeed)/11);
            let time = Date.now()/100;
            for(let i=0;i<22;i++) {
                let lineY = (time*16 + i*38) % ROAD_H;
                ctx.fillStyle = `rgba(210,235,255,${0.1+intensity*0.3})`;
                ctx.fillRect(ROAD_W - 50 - (i*6), lineY, 18,3);
            }
        }
        
        function drawScoreParticles() {
            for(let p of scoreParticles) {
                ctx.globalAlpha = p.life;
                ctx.font = "bold 24px monospace";
                ctx.fillStyle = p.isCoin ? "#FFD966" : "#FFD966";
                ctx.fillText(p.isCoin ? "🪙" : "+1", p.x-10, p.y-10);
            }
            ctx.globalAlpha = 1;
        }
        
        function drawMenu() {
            if (gameState === 'menu') {
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0,0,ROAD_W,ROAD_H);
                ctx.font = "bold 48px monospace"; ctx.fillStyle = "#ffd966"; ctx.textAlign = "center";
                ctx.fillText("🏁 HIGHWAY RACER", ROAD_W/2, ROAD_H/2 - 80);
                ctx.font = "28px monospace"; ctx.fillStyle = "#88ccff";
                ctx.fillText("Clique em INICIAR JOGO", ROAD_W/2, ROAD_H/2);
                ctx.font = "20px monospace"; ctx.fillStyle = "#bbbbff";
                ctx.fillText("↑ ↓ para mover • Colete moedas • Evite o trânsito", ROAD_W/2, ROAD_H/2 + 80);
                if (score > 0) { ctx.font = "24px monospace"; ctx.fillStyle = "#ffaa66"; ctx.fillText(`Última pontuação: ${score}`, ROAD_W/2, ROAD_H/2 + 140); }
            }
        }
        
        function drawHUD() {
            if (gameState === 'playing') {
                ctx.font = "bold 20px monospace"; ctx.fillStyle = "#FFE89A";
                ctx.fillText(`⚡ ${Math.floor(currentSpeed*15)} km/h`, ROAD_W-150, 42);
                ctx.fillStyle = "#9ac4ff"; ctx.fillText(`🚦 ${traffic.length}`, 22, 48);
                ctx.font = "14px monospace"; ctx.fillStyle = "#ccddff";
                ctx.fillText("↑  ↓  SETAS", ROAD_W/2-40, ROAD_H-16);
            }
        }
        
        function animate() {
            updateGame();
            drawRoad();
            drawSpeedEffects();
            drawTraffic();
            drawCoins();
            drawCoinParticles();
            if (gameState === 'playing') drawPlayerCar();
            drawScoreParticles();
            drawMenu();
            drawHUD();
            requestAnimationFrame(animate);
        }
        
        // ==================== LOJA ====================
        function openShop() {
            const modal = document.getElementById('shopModal');
            const modalCoinsSpan = document.getElementById('modalCoins');
            const colorListDiv = document.getElementById('colorList');
            modalCoinsSpan.innerText = playerCoins;
            colorListDiv.innerHTML = '';
            for(let i=0; i<availableColors.length; i++) {
                const color = availableColors[i];
                const div = document.createElement('div'); div.className = 'color-option';
                const preview = document.createElement('div'); preview.className = 'color-preview'; preview.style.backgroundColor = color.code;
                const nameSpan = document.createElement('span'); nameSpan.innerText = color.name;
                const priceSpan = document.createElement('span');
                if(color.owned) { priceSpan.innerText = '✅ COMPRADO'; priceSpan.style.color = '#aaffaa'; }
                else { priceSpan.innerText = `${color.price} 🪙`; priceSpan.className = 'color-price'; }
                div.appendChild(preview); div.appendChild(nameSpan); div.appendChild(priceSpan);
                if(!color.owned) {
                    div.style.cursor = 'pointer';
                    div.addEventListener('click', (function(c){ return function() {
                        if(!c.owned && playerCoins >= c.price) { if(spendCoins(c.price)) { c.owned = true; saveData(); openShop(); } }
                        else if(playerCoins < c.price) alert("Moedas insuficientes!");
                    }; })(color));
                } else {
                    div.style.cursor = 'pointer';
                    div.addEventListener('click', (function(c){ return function() { currentCarColor = c; saveData(); alert(`Cor alterada para ${c.name}!`); openShop(); }; })(color));
                }
                colorListDiv.appendChild(div);
            }
            modal.style.display = 'flex';
        }
        function closeShop() { document.getElementById('shopModal').style.display = 'none'; }
        
        // ==================== EVENTOS ====================
        function handleKey(e) {
            if (gameState !== 'playing') { if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); startGame(); } return; }
            if (e.key === 'ArrowUp') { movePlayer(-26); e.preventDefault(); }
            else if (e.key === 'ArrowDown') { movePlayer(26); e.preventDefault(); }
        }
        window.addEventListener('keydown', handleKey);
        document.getElementById('upBtn').addEventListener('click', () => movePlayer(-26));
        document.getElementById('downBtn').addEventListener('click', () => movePlayer(26));
        document.getElementById('restartBtn').addEventListener('click', () => { if (gameState === 'playing' || gameState === 'menu') startGame(); });
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('shopBtn').addEventListener('click', openShop);
        document.getElementById('closeModal').addEventListener('click', closeShop);
        window.addEventListener('click', (e) => { if(e.target === document.getElementById('shopModal')) closeShop(); });
        canvas.addEventListener('click', (e) => {
            if(gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const clickY = (e.clientY - rect.top) * (ROAD_H/rect.height);
            if(clickY < playerY + CAR_H/2) movePlayer(-26); else movePlayer(26);
        });
        
        loadSaveData();
        resetGameData();
        animate();
    })();
</script>
</body>
</html>
